name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  macos:
    name: macOS build
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: swift build

      - name: Package app
        run: ./script/package_release.sh

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChannelDeck-macOS
          path: outputs/ChannelDeck-macOS.zip
